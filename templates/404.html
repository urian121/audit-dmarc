<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="refresh" content="5;url={{ url_for('inicio') }}">
<title>Akila - Página no encontrada</title>
<link rel="icon" type="image/webp" href="{{ url_for('static', filename='img/favicon.webp') }}">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}" />
</head>
<body class="min-h-screen font-mono text-zinc-300 antialiased">

  <div class="fixed inset-0 bg-grid pointer-events-none"></div>

  <div class="relative">
    {% include "partials/header.html" %}

    <section class="max-w-xl mx-auto px-6 pt-24 pb-16 text-center">
      <p class="text-[#ef5184] text-sm tracking-[0.3em] uppercase mb-3">Error 404</p>
      <h1 class="text-2xl text-zinc-100 tracking-tight mb-3">Esta página no existe</h1>
      <p class="text-sm text-zinc-500 leading-relaxed mb-8">
        La ruta que intentaste abrir no existe o ya no está disponible. Te llevamos al inicio en unos segundos.
      </p>
      <a
        href="{{ url_for('inicio') }}"
        class="inline-flex items-center gap-1.5 px-5 py-2.5 rounded-md bg-[#ef5184] hover:bg-[#ef5184]/90 text-zinc-950 text-sm font-semibold tracking-wide transition-colors"
      >
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 shrink-0">
          <path d="M3 9.5 12 3l9 6.5"></path>
          <path d="M5 9.5V20a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V9.5"></path>
        </svg>
        Volver al inicio
      </a>
    </section>
  </div>

</body>
</html>
