<header class="border-zinc-800/80 print:hidden">
  <div class="max-w-5xl mx-auto px-6 py-5 flex items-center justify-between">
    <a href="{{ url_for('inicio') }}" class="flex items-center gap-2.5">
      <span class="relative flex w-3 h-3">
        <span class="radar-wave"></span>
        <span class="radar-wave"></span>
        <span class="radar-wave"></span>
        <span class="relative inline-flex w-3 h-3 rounded-full bg-[#ef5184] shadow-[0_0_10px_2px_rgba(239,81,132,0.6)]"></span>
      </span>
      <span class="text-sm tracking-[0.2em] text-zinc-200 uppercase">Akila-dmarc</span>
    </a>
    <div class="flex items-center gap-6">
      <a href="{{ url_for('monitoring_register') }}" class="inline-flex items-center gap-1.5 text-[11px] tracking-[0.15em] uppercase border rounded-md px-3 py-1.5 transition-colors {{ 'border-[#ef5184]/60 text-[#ef5184]' if request.endpoint == 'monitoring_register' else 'border-zinc-800 text-zinc-300 hover:border-[#ef5184]/60 hover:text-[#ef5184]' }}">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3.5 h-3.5 shrink-0">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
        Monitoreo
      </a>
      <a href="{{ url_for('monitoring_list') }}" class="inline-flex items-center gap-1.5 text-[11px] tracking-[0.15em] uppercase border rounded-md px-3 py-1.5 transition-colors {{ 'border-[#ef5184]/60 text-[#ef5184]' if request.endpoint in ('monitoring_list', 'monitoring_dashboard', 'monitoring_dns') else 'border-zinc-800 text-zinc-300 hover:border-[#ef5184]/60 hover:text-[#ef5184]' }}">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3.5 h-3.5 shrink-0">
          <line x1="8" y1="6" x2="21" y2="6"></line>
          <line x1="8" y1="12" x2="21" y2="12"></line>
          <line x1="8" y1="18" x2="21" y2="18"></line>
          <line x1="3" y1="6" x2="3.01" y2="6"></line>
          <line x1="3" y1="12" x2="3.01" y2="12"></line>
          <line x1="3" y1="18" x2="3.01" y2="18"></line>
        </svg>
        Monitores
      </a>
      {% if current_user.is_authenticated %}
        <form method="POST" action="{{ url_for('auth_logout') }}">
          <button type="submit" class="inline-flex items-center gap-1.5 text-[11px] text-zinc-300 tracking-[0.15em] uppercase border border-zinc-800 rounded-md px-3 py-1.5 hover:border-[#ef5184]/60 hover:text-[#ef5184] transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3.5 h-3.5 shrink-0">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            Salir
          </button>
        </form>
      {% else %}
        <a href="{{ url_for('auth_login') }}" class="inline-flex items-center gap-1.5 text-[11px] text-zinc-300 tracking-[0.15em] uppercase border border-zinc-800 rounded-md px-3 py-1.5 hover:border-[#ef5184]/60 hover:text-[#ef5184] transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3.5 h-3.5 shrink-0">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
            <polyline points="10 17 15 12 10 7"></polyline>
            <line x1="15" y1="12" x2="3" y2="12"></line>
          </svg>
          Ingresar
        </a>
      {% endif %}
    </div>
  </div>
</header>
